services:
  - type: web
    name: boarderswatch
    runtime: node
    plan: free
    region: singapore
    buildCommand: cd client && npm install && npm run build && cd ../server && npm install && npm rebuild better-sqlite3
    startCommand: cd server && node src/index.js
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "3000"